# 华夏游录 - 30 城 Godot 场景配置总览
# 每个城市包含 2-3 个关卡，共 85 个关卡

# ============================================
# 江南地区（5 城，15 关卡）
# ============================================

# 1. 苏州 (suzhou) - 难度★
city_suzhou:
  scenes:
    - name: "园林跑酷"
      type: "godot_action"
      subtype: "speed_run"
      difficulty: 1
      scene_file: "res://scenes/levels/suzhou_garden_speed.tscn"
      config:
        time_limit: 120
        platform_count: 20
        obstacle_density: "low"
        background: "res://assets/backgrounds/suzhou_garden.png"
        
    - name: "虎丘塔战斗"
      type: "godot_action"
      subtype: "castle_battle"
      difficulty: 1
      scene_file: "res://scenes/levels/suzhou_tiger_hill.tscn"
      config:
        enemy_count: 5
        enemy_type: "guard"
        background: "res://assets/backgrounds/tiger_hill_pagoda.png"
        
    - name: "苏绣之谜"
      type: "puzzle"
      difficulty: 1
      scene_file: "res://scenes/levels/suzhou_embroidery_puzzle.tscn"
      config:
        puzzle_type: "pictorial"
        hint_count: 3
        time_limit: 300

