# ============================================
# 关卡类型统计
# ============================================
# Godot Action (Speed Run): 22 个
# Godot Action (Castle Battle): 18 个
# Godot Action (Platform Challenge): 10 个
# Godot Action (Boss Battle): 15 个
# Puzzle (解谜): 12 个
# Rhythm (节奏): 2 个
# Dating (恋爱): 2 个
# Survival (生存): 4 个（未列出，需补充）
# Escape (逃亡): 2 个
# 
# 总计：85+ 关卡
